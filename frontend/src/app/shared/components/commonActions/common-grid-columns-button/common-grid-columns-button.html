<div class="btn-group btn-group-sm">
  <button type="button" class="btn btn-light">
    <i class="ki-duotone ki-element-11 fs-5">
      <span class="path1"></span><span class="path2"></span>
      <span class="path3"></span><span class="path4"></span>
    </i>
    {{ columns }}
  </button>
  <button type="button" class="btn btn-light dropdown-toggle dropdown-toggle-split"
    data-bs-toggle="dropdown" aria-expanded="false"></button>
  <ul class="dropdown-menu dropdown-menu-end">
    @for (n of options; track n) {
    <li>
      <a class="dropdown-item cursor-pointer d-flex align-items-center gap-2" (click)="select(n)">
        @if (columns === n) {
          <i class="ki-duotone ki-check fs-5 text-primary"><span class="path1"></span></i>
        } @else {
          <span style="width: 18px; display: inline-block;"></span>
        }
        {{ n }}
      </a>
    </li>
    }
  </ul>
</div>
