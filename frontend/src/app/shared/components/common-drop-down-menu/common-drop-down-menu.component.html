<ul class="dropdown-menu dropdown-menu-end">
  @for (item of items; track item.labelKey) {
    <li>
      <a class="dropdown-item cursor-pointer" (click)="item.action()">
        <i class="ki-duotone {{ item.iconClass }} fs-3 me-2">
          @for (p of getPathRange(item.iconPaths ?? 2); track p) {
            <span class="path{{ p }}"></span>
          }
        </i>
        {{ item.labelKey | translate }}
      </a>
    </li>
  }
</ul>
