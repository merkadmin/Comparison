<!--START::Edit Modal-->
<div class="modal fade show d-block modal-inline-backdrop" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-md">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title fw-bold">
          {{ (isCreating ? 'itemVariantMap.addNew' : 'common.edit') | translate }}
        </h5>
        <button type="button" class="btn-close" [disabled]="saving" (click)="closed.emit()"></button>
      </div>

      <div class="modal-body">

        <!--START::Item-->
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ 'itemVariantMap.item' | translate }} <span class="text-danger">*</span></label>
          <select class="form-select" [(ngModel)]="editDraft.productItemId">
            <option [ngValue]="0" disabled>{{ 'itemVariantMap.selectItem' | translate }}</option>
            @for (item of items; track item.id) {
              <option [ngValue]="item.id">{{ item.name }}</option>
            }
          </select>
        </div>
        <!--END::Item-->

        <!--START::Variant Type Filter-->
        <div class="mb-2">
          <label class="form-label fw-semibold">{{ 'variant.variantType' | translate }}</label>
          <div class="d-flex flex-wrap gap-2">
            <button type="button" class="btn btn-sm"
              [class.btn-primary]="selectedType() === null"
              [class.btn-light]="selectedType() !== null"
              (click)="selectType(null)">
              {{ 'common.all' | translate }}
            </button>
            @for (type of variantTypes; track type) {
              <button type="button" class="btn btn-sm"
                [class.btn-primary]="selectedType() === type"
                [class.btn-light]="selectedType() !== type"
                (click)="selectType(type)">
                {{ 'variant.type.' + type | translate }}
              </button>
            }
          </div>
        </div>
        <!--END::Variant Type Filter-->

        <!--START::Variant-->
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ 'itemVariantMap.variant' | translate }} <span class="text-danger">*</span></label>
          <select class="form-select" [(ngModel)]="editDraft.variantId">
            <option [ngValue]="0" disabled>{{ 'itemVariantMap.selectVariant' | translate }}</option>
            @for (v of filteredVariants(); track v.id) {
              <option [ngValue]="v.id">{{ v.variantTypeId }} — {{ v.variantValue }}{{ v.abbreviation ? ' (' + v.abbreviation + ')' : '' }}</option>
            }
          </select>
        </div>
        <!--END::Variant-->

        <hr class="my-3" />
        <p class="text-muted fs-7 mb-3">{{ 'itemVariantMap.pricingOptionalHint' | translate }}</p>

        <!--START::Selling Price-->
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ 'itemVariantMap.sellingPrice' | translate }}</label>
          <input type="number" class="form-control" min="0" step="0.01"
            [placeholder]="'itemVariantMap.sellingPricePlaceholder' | translate"
            [(ngModel)]="editDraft.sellingPrice" />
        </div>
        <!--END::Selling Price-->

        <!--START::Store-->
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ 'itemVariantMap.store' | translate }}</label>
          <input type="number" class="form-control"
            [placeholder]="'itemVariantMap.storePlaceholder' | translate"
            [(ngModel)]="editDraft.storeId" />
        </div>
        <!--END::Store-->

        <!--START::Description-->
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ 'itemVariantMap.description' | translate }}</label>
          <textarea class="form-control" rows="2"
            [placeholder]="'itemVariantMap.descriptionPlaceholder' | translate"
            [(ngModel)]="editDraft.description"></textarea>
        </div>
        <!--END::Description-->

        <!--START::About-->
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ 'itemVariantMap.about' | translate }}</label>
          <textarea class="form-control" rows="2"
            [placeholder]="'itemVariantMap.aboutPlaceholder' | translate"
            [(ngModel)]="editDraft.about"></textarea>
        </div>
        <!--END::About-->

      </div>

      <div class="modal-footer gap-2">
        <button type="button" class="btn btn-light" [disabled]="saving" (click)="closed.emit()">{{ 'common.cancel' | translate }}</button>
        @if (isCreating) {
          <button type="button" class="btn btn-light-primary"
            [disabled]="saving || !editDraft.productItemId || !editDraft.variantId"
            (click)="savedAndNew.emit()">
            @if (saving) { <span class="spinner-border spinner-border-sm me-1"></span> }
            {{ 'common.saveAndNew' | translate }}
          </button>
        }
        <button type="button" class="btn btn-primary"
          [disabled]="saving || !editDraft.productItemId || !editDraft.variantId"
          (click)="saved.emit()">
          @if (saving) { <span class="spinner-border spinner-border-sm me-1"></span> }
          {{ 'common.save' | translate }}
        </button>
      </div>

    </div>
  </div>
</div>
<!--END::Edit Modal-->
