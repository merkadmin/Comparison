<!--START::Store Item Draft Modal-->
<div class="modal fade show d-block" tabindex="-1" style="z-index: 1060;">
  <div class="modal-dialog modal-dialog-centered modal-md">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title fw-bold me-auto">
          {{ (isEditing ? 'common.edit' : 'storeItem.addItem') | translate }}
        </h5>
        <div class="d-flex align-items-center gap-2 me-2">
          <button type="button" class="btn btn-sm btn-light" (click)="closed.emit()">{{ 'common.cancel' | translate }}</button>
          @if (!isEditing) {
            <button type="button" class="btn btn-sm btn-light-primary" (click)="savedAndNew.emit()">{{ 'common.saveAndNew' | translate }}</button>
          }
          <button type="button" class="btn btn-sm btn-primary" (click)="saved.emit()">{{ 'common.save' | translate }}</button>
        </div>
      </div>

      <div class="modal-body">

        <!--START::Item-->
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ 'storeItem.item' | translate }} <span class="text-danger">*</span></label>
          <select class="form-select" [(ngModel)]="draft.itemId">
            <option [ngValue]="0" disabled>— {{ 'storeItem.selectItem' | translate }} —</option>
            @for (item of items; track item.id) {
              <option [ngValue]="item.id">{{ item.name }}</option>
            }
          </select>
        </div>
        <!--END::Item-->

        <!--START::Selling Price & Price Type-->
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">{{ 'storeItem.sellingPrice' | translate }} <span class="text-danger">*</span></label>
            <input type="number" min="0" step="0.01" class="form-control" [(ngModel)]="draft.sellingPrice" />
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">{{ 'storeItem.priceType' | translate }}</label>
            <select class="form-select" [(ngModel)]="draft.sellingPriceTypeId">
              @for (t of sellingPriceTypes; track t) {
                <option [value]="t">{{ 'storeItem.priceType.' + t | translate }}</option>
              }
            </select>
          </div>
        </div>
        <!--END::Selling Price & Price Type-->

        <!--START::Available Quantity-->
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ 'storeItem.availableQty' | translate }}</label>
          <input type="number" min="0" class="form-control" [(ngModel)]="draft.quantity" />
        </div>
        <!--END::Available Quantity-->

        <!--START::Is Delivery Available-->
        <div class="mb-3">
          <div class="form-check form-check-custom form-check-solid">
            <input class="form-check-input" type="checkbox" id="isDelivery" [(ngModel)]="draft.isDeliverAvailable" />
            <label class="form-check-label fw-semibold" for="isDelivery">
              {{ 'storeItem.isDeliveryAvailable' | translate }}
            </label>
          </div>
        </div>
        <!--END::Is Delivery Available-->

      </div>

    </div>
  </div>
</div>
<div class="modal-backdrop fade show" style="z-index: 1055;"></div>
<!--END::Store Item Draft Modal-->
