<!--START::Edit Modal-->
<div class="modal fade show d-block modal-inline-backdrop" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-md">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title fw-bold">
          {{ (isCreating ? 'variant.addNew' : 'common.edit') | translate }}
        </h5>
        <button type="button" class="btn-close" [disabled]="saving" (click)="closed.emit()"></button>
      </div>

      <div class="modal-body">

        <!--START::Variant Type-->
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ 'variant.variantType' | translate }} <span class="text-danger">*</span></label>
          <select class="form-select" [(ngModel)]="editDraft.variantTypeId" [disabled]="saving">
            @for (type of variantTypes; track type) {
              <option [ngValue]="type">{{ 'variant.type.' + type | translate }}</option>
            }
          </select>
        </div>
        <!--END::Variant Type-->

        <!--START::Variant Value-->
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ 'variant.variantValue' | translate }}</label>
          <input type="text" class="form-control" [(ngModel)]="editDraft.variantValue"
            [disabled]="saving"
            [placeholder]="'variant.variantValuePlaceholder' | translate" />
        </div>
        <!--END::Variant Value-->

        <!--START::Abbreviation-->
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ 'variant.abbreviation' | translate }}</label>
          <input type="text" class="form-control" [(ngModel)]="editDraft.abbreviation"
            [disabled]="saving"
            [placeholder]="'variant.abbreviationPlaceholder' | translate" />
        </div>
        <!--END::Abbreviation-->

      </div>

      <div class="modal-footer gap-2">
        <button type="button" class="btn btn-light" [disabled]="saving" (click)="closed.emit()">
          {{ 'common.cancel' | translate }}
        </button>

        @if (isCreating) {
          <button type="button" class="btn btn-light-primary" [disabled]="saving" (click)="savedAndNew.emit()">
            @if (saving) {
              <span class="spinner-border spinner-border-sm me-1"></span>
            }
            {{ 'common.saveAndNew' | translate }}
          </button>
        }

        <button type="button" class="btn btn-primary" [disabled]="saving" (click)="saved.emit()">
          @if (saving) {
            <span class="spinner-border spinner-border-sm me-1"></span>
          }
          {{ 'common.save' | translate }}
        </button>
      </div>

    </div>
  </div>
</div>
<!--END::Edit Modal-->
