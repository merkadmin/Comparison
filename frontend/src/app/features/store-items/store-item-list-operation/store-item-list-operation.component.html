<!--START::Create / Edit Modal-->
<div class="modal fade show d-block modal-inline-backdrop" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title fw-bold">
          {{ (isCreating ? 'storeItem.addNew' : 'common.edit') | translate }}
        </h5>
        <button type="button" class="btn-close" [disabled]="saving" (click)="closed.emit()"></button>
      </div>

      <div class="modal-body">

        <!--START::Item-->
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ 'storeItem.item' | translate }} <span class="text-danger">*</span></label>
          <select class="form-select" [(ngModel)]="editDraft.itemId">
            <option [ngValue]="0" disabled>— {{ 'storeItem.selectItem' | translate }} —</option>
            @for (item of items; track item.id) {
              <option [ngValue]="item.id">{{ item.name }}</option>
            }
          </select>
        </div>
        <!--END::Item-->

        <!--START::Store-->
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ 'storeItem.store' | translate }} <span class="text-danger">*</span></label>
          <select class="form-select" [(ngModel)]="editDraft.storeId">
            <option [ngValue]="0" disabled>— {{ 'storeItem.selectStore' | translate }} —</option>
            @for (store of stores; track store.id) {
              <option [ngValue]="store.id">{{ store.name }}</option>
            }
          </select>
        </div>
        <!--END::Store-->

        <!--START::Price & Type-->
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">{{ 'storeItem.sellingPrice' | translate }} <span class="text-danger">*</span></label>
            <input type="number" min="0" step="0.01" class="form-control" [(ngModel)]="editDraft.sellingPrice" />
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">{{ 'storeItem.priceType' | translate }} <span class="text-danger">*</span></label>
            <select class="form-select" [(ngModel)]="editDraft.sellingPriceTypeId">
              @for (t of sellingPriceTypes; track t) {
                <option [value]="t">{{ 'storeItem.priceType.' + t | translate }}</option>
              }
            </select>
          </div>
        </div>
        <!--END::Price & Type-->

      </div>

      <div class="modal-footer gap-2">
        <button type="button" class="btn btn-light" [disabled]="saving" (click)="closed.emit()">{{ 'common.cancel' | translate }}</button>
        @if (isCreating) {
          <button type="button" class="btn btn-light-primary" [disabled]="saving" (click)="savedAndNew.emit()">
            @if (saving) { <span class="spinner-border spinner-border-sm me-1"></span> }
            {{ 'common.saveAndNew' | translate }}
          </button>
        }
        <button type="button" class="btn btn-primary" [disabled]="saving" (click)="saved.emit()">
          @if (saving) { <span class="spinner-border spinner-border-sm me-1"></span> }
          {{ 'common.save' | translate }}
        </button>
      </div>

    </div>
  </div>
</div>
<!--END::Create / Edit Modal-->
