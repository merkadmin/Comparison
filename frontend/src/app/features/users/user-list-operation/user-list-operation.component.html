<!--START::Create / Edit Modal-->
<div class="modal fade show d-block modal-inline-backdrop" tabindex="-1" (keydown.escape)="closed.emit()">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title fw-bold">
          {{ (isCreating ? 'userOperation.addTitle' : 'userOperation.editTitle') | translate }}
        </h5>
        <button type="button" class="btn btn-icon btn-sm btn-light" [disabled]="saving" (click)="closed.emit()">
          <i class="ki-duotone ki-cross fs-3"><span class="path1"></span><span class="path2"></span></i>
        </button>
      </div>

      <div class="modal-body">

        <!--START::Username-->
        <div class="mb-3">
          <label class="form-label fw-semibold">
            {{ 'userOperation.userName' | translate }}
            <span class="text-danger">*</span>
          </label>
          <input type="text" class="form-control" [(ngModel)]="editDraft.userName"
            [class.is-invalid]="!editDraft.userName" />
        </div>
        <!--END::Username-->

        <!--START::Email-->
        <div class="mb-3">
          <label class="form-label fw-semibold">
            {{ 'userOperation.email' | translate }}
            <span class="text-danger">*</span>
          </label>
          <input type="email" class="form-control" [(ngModel)]="editDraft.email"
            [class.is-invalid]="!editDraft.email" />
        </div>
        <!--END::Email-->

        <!--START::Login-->
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ 'userOperation.login' | translate }}</label>
          <input type="text" class="form-control" [(ngModel)]="editDraft.login"
            [placeholder]="'userOperation.loginPlaceholder' | translate" />
        </div>
        <!--END::Login-->

        <!--START::Password (create only)-->
        @if (isCreating) {
        <div class="mb-3">
          <label class="form-label fw-semibold">
            {{ 'userOperation.password' | translate }}
            <span class="text-danger">*</span>
          </label>
          <input type="password" class="form-control" [(ngModel)]="editDraft.password"
            [class.is-invalid]="!editDraft.password" />
        </div>
        }
        <!--END::Password-->

        <!--START::Privilege-->
        <div class="mb-3">
          <label class="form-label fw-semibold">
            {{ 'userOperation.privilege' | translate }}
            <span class="text-danger">*</span>
          </label>
          @if (editDraft.privilege === 'Root') {
          <input type="text" class="form-control" value="Root" disabled />
          <div class="text-muted fs-7 mt-1">{{ 'userOperation.rootPrivilegeLocked' | translate }}</div>
          } @else {
          <select class="form-select" [(ngModel)]="editDraft.privilege">
            @for (p of privileges; track p) {
            <option [value]="p">{{ p }}</option>
            }
          </select>
          }
        </div>
        <!--END::Privilege-->

      </div>

      <div class="modal-footer justify-content-end gap-2">
        <button type="button" class="btn btn-sm btn-light" [disabled]="saving" (click)="closed.emit()">
          {{ 'common.cancel' | translate }}
        </button>
        @if (isCreating) {
        <button type="button" class="btn btn-sm btn-light-primary" [disabled]="saving || !isValid"
          (click)="savedAndNew.emit()">
          @if (saving) { <span class="spinner-border spinner-border-sm me-1"></span> }
          {{ 'common.saveAndNew' | translate }}
        </button>
        }
        <button type="button" class="btn btn-sm btn-primary" [disabled]="saving || !isValid"
          (click)="saved.emit()">
          @if (saving) { <span class="spinner-border spinner-border-sm me-1"></span> }
          {{ 'common.save' | translate }}
        </button>
      </div>

    </div>
  </div>
</div>
<!--END::Create / Edit Modal-->
