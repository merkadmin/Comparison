<!--START::Create / Edit Modal-->
<div class="modal fade show d-block modal-inline-backdrop" tabindex="-1" (keydown.escape)="closed.emit()">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        @if (!isCreating) {
          <button type="button" class="btn btn-icon btn-sm btn-light me-2" [disabled]="saving" (click)="navigate.emit(-1)">
            <i class="ki-duotone ki-arrow-left fs-3"><span class="path1"></span><span class="path2"></span></i>
          </button>
        }
        <h5 class="modal-title fw-bold me-auto">
          {{ (isCreating ? 'productType.addTitle' : 'productType.editTitle') | translate }}
        </h5>
        <button type="button" class="btn btn-icon btn-sm btn-light" [disabled]="saving" (click)="closed.emit()">
          <i class="ki-duotone ki-cross fs-3"><span class="path1"></span><span class="path2"></span></i>
        </button>
      </div>

      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label fw-semibold">
            {{ 'productType.type' | translate }} <span class="text-danger">*</span>
          </label>
          <input type="text" class="form-control" [(ngModel)]="editDraft.type"
            placeholder="{{ 'productType.typePlaceholder' | translate }}" />
        </div>
      </div>

      <div class="modal-footer justify-content-end gap-2">
        <button type="button" class="btn btn-sm btn-light" [disabled]="saving" (click)="closed.emit()">{{ 'common.cancel' | translate }}</button>
        @if (isCreating) {
          <button type="button" class="btn btn-sm btn-light-primary" [disabled]="saving" (click)="savedAndNew.emit()">
            @if (saving) { <span class="spinner-border spinner-border-sm me-1"></span> }
            {{ 'common.saveAndNew' | translate }}
          </button>
        }
        <button type="button" class="btn btn-sm btn-primary" [disabled]="saving" (click)="saved.emit()">
          @if (saving) { <span class="spinner-border spinner-border-sm me-1"></span> }
          {{ 'common.save' | translate }}
        </button>
      </div>

    </div>
  </div>
</div>
<!--END::Create / Edit Modal-->
