<!--START::Edit Modal-->
<div class="modal fade show d-block modal-inline-backdrop" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-md">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title fw-bold me-auto">
          {{ (isCreating ? 'variant.addTitle' : 'variant.editTitle') | translate }}
        </h5>
        <div class="d-flex align-items-center gap-2 me-2">
          <button type="button" class="btn btn-sm btn-light" [disabled]="saving" (click)="closed.emit()">{{ 'common.cancel' | translate }}</button>
          @if (isCreating) {
            <button type="button" class="btn btn-sm btn-light-primary" [disabled]="saving" (click)="savedAndNew.emit()">
              @if (saving) { <span class="spinner-border spinner-border-sm me-1"></span> }
              {{ 'common.saveAndNew' | translate }}
            </button>
          }
          <button type="button" class="btn btn-sm btn-primary" [disabled]="saving" (click)="saved.emit()">
            @if (saving) { <span class="spinner-border spinner-border-sm me-1"></span> }
            {{ 'common.save' | translate }}
          </button>
        </div>
      </div>

      <div class="modal-body">

        <!--START::Variant Type-->
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ 'variant.variantType' | translate }} <span class="text-danger">*</span></label>
          <select class="form-select" [(ngModel)]="editDraft.variantTypeId" [disabled]="saving">
            @for (type of variantTypes; track type) {
              <option [ngValue]="type">{{ 'variant.type.' + type | translate }}</option>
            }
          </select>
        </div>
        <!--END::Variant Type-->

        <!--START::Color-->
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ 'variant.color' | translate }}</label>
          <div class="d-flex flex-wrap gap-2 mb-2">
            @for (c of colorPalette; track c) {
              <div class="variant-color-swatch cursor-pointer"
                   [style.background]="c"
                   [class.variant-color-swatch--selected]="editDraft.color === c"
                   [class.variant-color-swatch--dark]="c === '#FFFFFF' || c === '#D1D5DB'"
                   [title]="c"
                   (click)="editDraft.color = c">
              </div>
            }
            <div class="variant-color-swatch variant-color-swatch--clear cursor-pointer"
                 [class.variant-color-swatch--selected]="!editDraft.color"
                 title="No color"
                 (click)="editDraft.color = undefined">
              <i class="ki-duotone ki-cross fs-9"><span class="path1"></span><span class="path2"></span></i>
            </div>
          </div>
          @if (editDraft.color) {
            <div class="d-flex align-items-center gap-2 mt-1">
              <div class="variant-color-swatch variant-color-swatch--preview"
                   [style.background]="editDraft.color"
                   [class.variant-color-swatch--dark]="editDraft.color === '#FFFFFF' || editDraft.color === '#D1D5DB'">
              </div>
              <input type="color" class="form-control form-control-color p-1"
                     style="width:40px;height:34px;"
                     [(ngModel)]="editDraft.color"
                     [disabled]="saving" />
              <span class="text-muted fs-7">{{ editDraft.color }}</span>
            </div>
          }
        </div>
        <!--END::Color-->

        <!--START::Variant Value-->
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ 'variant.variantValue' | translate }}</label>
          <input type="text" class="form-control" [(ngModel)]="editDraft.variantValue"
            [disabled]="saving"
            [placeholder]="'variant.variantValuePlaceholder' | translate" />
        </div>
        <!--END::Variant Value-->

        <!--START::Abbreviation-->
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ 'variant.abbreviation' | translate }}</label>
          <input type="text" class="form-control" [(ngModel)]="editDraft.abbreviation"
            [disabled]="saving"
            [placeholder]="'variant.abbreviationPlaceholder' | translate" />
        </div>
        <!--END::Abbreviation-->

      </div>


    </div>
  </div>
</div>
<!--END::Edit Modal-->
