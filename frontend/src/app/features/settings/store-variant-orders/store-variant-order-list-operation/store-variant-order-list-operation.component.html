<!--START::Edit Modal-->
<div class="modal fade show d-block modal-inline-backdrop" tabindex="-1" (keydown.escape)="closed.emit()">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-md">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title fw-bold me-auto">
          {{ (isCreating ? 'storeVariantOrder.addTitle' : 'storeVariantOrder.editTitle') | translate }}
        </h5>
        <button type="button" class="btn btn-icon btn-sm btn-light" [disabled]="saving" (click)="closed.emit()">
          <i class="ki-duotone ki-cross fs-3"><span class="path1"></span><span class="path2"></span></i>
        </button>
      </div>

      <div class="modal-body">

        <!--START::Scope Toggle-->
        <div class="mb-4">
          <label class="form-label fw-semibold">{{ 'storeVariantOrder.scopeMode' | translate }} <span class="text-danger">*</span></label>
          <div class="d-flex gap-2">
            <button type="button" class="btn btn-sm flex-fill"
              [class.btn-primary]="scopeMode === 'store'"
              [class.btn-light]="scopeMode !== 'store'"
              [disabled]="saving"
              (click)="onScopeModeChange('store')">
              <i class="ki-duotone ki-shop fs-5 me-1"><span class="path1"></span><span class="path2"></span><span class="path3"></span><span class="path4"></span><span class="path5"></span></i>
              {{ 'storeVariantOrder.byStore' | translate }}
            </button>
            <button type="button" class="btn btn-sm flex-fill"
              [class.btn-primary]="scopeMode === 'category'"
              [class.btn-light]="scopeMode !== 'category'"
              [disabled]="saving"
              (click)="onScopeModeChange('category')">
              <i class="ki-duotone ki-category fs-5 me-1"><span class="path1"></span><span class="path2"></span><span class="path3"></span><span class="path4"></span></i>
              {{ 'storeVariantOrder.byCategory' | translate }}
            </button>
          </div>
        </div>
        <!--END::Scope Toggle-->

        <!--START::Store (shown when scope = store)-->
        @if (scopeMode === 'store') {
          <div class="mb-3">
            <label class="form-label fw-semibold">{{ 'storeVariantOrder.store' | translate }} <span class="text-danger">*</span></label>
            <select class="form-select" [(ngModel)]="editDraft.storeId" [disabled]="saving">
              <option [ngValue]="0" disabled>{{ 'storeVariantOrder.selectStore' | translate }}</option>
              @for (s of stores; track s.id) {
                <option [ngValue]="s.id">{{ s.name }}</option>
              }
            </select>
          </div>
        }
        <!--END::Store-->

        <!--START::Category (shown when scope = category)-->
        @if (scopeMode === 'category') {
          <div class="mb-3">
            <label class="form-label fw-semibold">{{ 'storeVariantOrder.category' | translate }} <span class="text-danger">*</span></label>
            <select class="form-select" [(ngModel)]="editDraft.categoryId" [disabled]="saving">
              <option [ngValue]="null" disabled>{{ 'storeVariantOrder.selectCategory' | translate }}</option>
              @for (c of categories; track c.id) {
                <option [ngValue]="c.id">{{ getCategoryPath(c.id!) }}</option>
              }
            </select>
            <div class="form-text text-muted">{{ 'storeVariantOrder.categoryHint' | translate }}</div>
          </div>
        }
        <!--END::Category-->

        <!--START::Variant Type-->
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ 'variant.variantType' | translate }} <span class="text-danger">*</span></label>
          <select class="form-select" [(ngModel)]="editDraft.variantTypeId" [disabled]="saving">
            <option [ngValue]="null" disabled>{{ 'storeVariantOrder.selectVariantType' | translate }}</option>
            @for (t of variantTypes; track t) {
              <option [ngValue]="t">{{ 'variant.type.' + t | translate }}</option>
            }
          </select>
        </div>
        <!--END::Variant Type-->

        <!--START::Order Index-->
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ 'storeVariantOrder.orderIndex' | translate }} <span class="text-danger">*</span></label>
          <input type="number" class="form-control" [(ngModel)]="editDraft.orderIndex"
            [disabled]="saving" min="0" />
        </div>
        <!--END::Order Index-->

      </div>

      <div class="modal-footer justify-content-end gap-2">
        <button type="button" class="btn btn-sm btn-light" [disabled]="saving" (click)="closed.emit()">{{ 'common.cancel' | translate }}</button>
        @if (isCreating) {
          <button type="button" class="btn btn-sm btn-light-primary" [disabled]="saving" (click)="savedAndNew.emit()">
            @if (saving) { <span class="spinner-border spinner-border-sm me-1"></span> }
            {{ 'common.saveAndNew' | translate }}
          </button>
        }
        <button type="button" class="btn btn-sm btn-primary" [disabled]="saving" (click)="saved.emit()">
          @if (saving) { <span class="spinner-border spinner-border-sm me-1"></span> }
          {{ 'common.save' | translate }}
        </button>
      </div>

    </div>
  </div>
</div>
<!--END::Edit Modal-->
