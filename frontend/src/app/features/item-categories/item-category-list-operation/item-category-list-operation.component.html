<!--START::Create / Edit Modal-->
<div class="modal fade show d-block modal-inline-backdrop" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title fw-bold me-auto">
          {{ (isCreating ? 'category.addTitle' : 'category.editTitle') | translate }}
        </h5>
        <div class="d-flex align-items-center gap-2 me-2">
          <button type="button" class="btn btn-sm btn-light" [disabled]="saving" (click)="closed.emit()">{{ 'common.cancel' | translate }}</button>
          @if (isCreating) {
            <button type="button" class="btn btn-sm btn-light-primary" [disabled]="saving" (click)="savedAndNew.emit()">
              @if (saving) { <span class="spinner-border spinner-border-sm me-1"></span> }
              {{ 'common.saveAndNew' | translate }}
            </button>
          }
          <button type="button" class="btn btn-sm btn-primary" [disabled]="saving" (click)="saved.emit()">
            @if (saving) { <span class="spinner-border spinner-border-sm me-1"></span> }
            {{ 'common.save' | translate }}
          </button>
        </div>
      </div>

      <div class="modal-body">

        <!--START::Names-->
        <div class="row mb-3">
          <div class="col-md-4">
            <label class="form-label fw-semibold">{{ 'common.nameEn' | translate }} <span class="text-danger">*</span></label>
            <input type="text" class="form-control" [(ngModel)]="editDraft.name.en" />
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">{{ 'common.nameAr' | translate }}</label>
            <input type="text" class="form-control" [(ngModel)]="editDraft.name.ar" />
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">{{ 'common.nameFr' | translate }}</label>
            <input type="text" class="form-control" [(ngModel)]="editDraft.name.fr" />
          </div>
        </div>
        <!--END::Names-->

        <!--START::Descriptions-->
        <div class="row mb-3">
          <div class="col-md-4">
            <label class="form-label fw-semibold">{{ 'common.descriptionEn' | translate }}</label>
            <input type="text" class="form-control" [(ngModel)]="editDraft.description!.en" />
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">{{ 'common.descriptionAr' | translate }}</label>
            <input type="text" class="form-control" [(ngModel)]="editDraft.description!.ar" />
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">{{ 'common.descriptionFr' | translate }}</label>
            <input type="text" class="form-control" [(ngModel)]="editDraft.description!.fr" />
          </div>
        </div>
        <!--END::Descriptions-->

        <!--START::Parent Category-->
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ 'category.parentCategory' | translate }}</label>
          <select class="form-select" [(ngModel)]="editDraft.parentCategoryId">
            <option [ngValue]="null">— {{ 'category.noParent' | translate }} —</option>
            @for (c of parentOptions; track c.id) {
              <option [ngValue]="c.id">{{ localize(c.name) }}</option>
            }
          </select>
        </div>
        <!--END::Parent Category-->

        <!--START::Category Image-->
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ 'category.image' | translate }}</label>

          <!--START::Current / Preview Image-->
          @if (pendingPreviewUrl || editDraft.categoryImage) {
            <div class="d-flex align-items-start gap-3 mb-3">
              <div class="position-relative">
                <img
                  [src]="pendingPreviewUrl ?? imgUrl(editDraft.categoryImage!)"
                  class="rounded border object-fit-cover"
                  style="width: 120px; height: 120px;" />
                @if (pendingPreviewUrl) {
                  <span class="badge badge-light-warning position-absolute bottom-0 start-0 fs-9">{{ 'common.new' | translate }}</span>
                }
                <button type="button"
                  class="btn btn-icon btn-xs btn-danger position-absolute top-0 end-0"
                  (click)="pendingPreviewUrl ? removePendingFile() : imageRemoved.emit()">
                  <i class="ki-duotone ki-cross fs-9"><span class="path1"></span><span class="path2"></span></i>
                </button>
              </div>
            </div>
          }
          <!--END::Current / Preview Image-->

          <!--START::Upload Button-->
          @if (!pendingPreviewUrl && !editDraft.categoryImage) {
            <div>
              <input #imgInput type="file" accept="image/*" class="d-none" (change)="onFileSelected($event)" />
              <button type="button" class="btn btn-light-primary btn-sm" (click)="imgInput.click()">
                <i class="ki-duotone ki-picture fs-5 me-1"><span class="path1"></span><span class="path2"></span></i>
                {{ 'common.uploadImages' | translate }}
              </button>
            </div>
          }
          <!--END::Upload Button-->
        </div>
        <!--END::Category Image-->

      </div>


    </div>
  </div>
</div>
<!--END::Create / Edit Modal-->
