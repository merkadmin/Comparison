<!--START::Create / Edit Modal-->
<div class="modal fade show d-block modal-inline-backdrop" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title fw-bold">
          {{ (isCreating ? 'brand.addNew' : 'common.edit') | translate }}
        </h5>
        <button type="button" class="btn-close" [disabled]="saving" (click)="closed.emit()"></button>
      </div>

      <div class="modal-body">

        <!--START::Name-->
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ 'common.name' | translate }} <span class="text-danger">*</span></label>
          <input type="text" class="form-control" [(ngModel)]="editDraft.name" />
        </div>
        <!--END::Name-->

        <!--START::Country-->
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ 'common.country' | translate }}</label>
          <input type="text" class="form-control" [(ngModel)]="editDraft.country" />
        </div>
        <!--END::Country-->

        <!--START::Logo URL-->
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ 'common.logoUrl' | translate }}</label>
          <input type="url" class="form-control" [(ngModel)]="editDraft.logoUrl" />
        </div>
        <!--END::Logo URL-->

      </div>

      <div class="modal-footer gap-2">
        <button type="button" class="btn btn-light" [disabled]="saving" (click)="closed.emit()">{{ 'common.cancel' | translate }}</button>
        @if (isCreating) {
          <button type="button" class="btn btn-light-primary" [disabled]="saving" (click)="savedAndNew.emit()">
            @if (saving) { <span class="spinner-border spinner-border-sm me-1"></span> }
            {{ 'common.saveAndNew' | translate }}
          </button>
        }
        <button type="button" class="btn btn-primary" [disabled]="saving" (click)="saved.emit()">
          @if (saving) { <span class="spinner-border spinner-border-sm me-1"></span> }
          {{ 'common.save' | translate }}
        </button>
      </div>

    </div>
  </div>
</div>
<!--END::Create / Edit Modal-->
