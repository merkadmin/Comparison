<!--begin::Header-->
<div id="kt_app_header" class="app-header"
     data-kt-sticky="true"
     data-kt-sticky-activate="{default: true, lg: true}"
     data-kt-sticky-name="app-header-minimize"
     data-kt-sticky-offset="{default: '200px', lg: '0'}"
     data-kt-sticky-animation="false">

  <!--begin::Header container-->
  <div class="app-container container-fluid d-flex align-items-stretch justify-content-between"
       id="kt_app_header_container">

    <!--begin::Sidebar mobile toggle-->
    <div class="d-flex align-items-center d-lg-none me-n3 ms-1 ms-md-2" title="إظهار القائمة الجانبية">
      <div class="btn btn-icon btn-active-color-primary w-35px h-35px"
           id="kt_app_sidebar_mobile_toggle">
        <i class="ki-duotone ki-abstract-14 fs-2 fs-md-1">
          <span class="path1"></span>
          <span class="path2"></span>
        </i>
      </div>
    </div>
    <!--end::Sidebar mobile toggle-->

    <!--begin::Mobile logo-->
    <div class="d-flex align-items-center flex-grow-1 flex-lg-grow-0">
      <a routerLink="/" class="d-lg-none">
        <img alt="Logo" src="assets/media/logos/default-small.svg" class="h-30px" />
      </a>
    </div>
    <!--end::Mobile logo-->

    <!--begin::Header wrapper-->
    <div class="d-flex align-items-stretch justify-content-between flex-lg-grow-1"
         id="kt_app_header_wrapper">

      <!--begin::Page title-->
      <div class="app-navbar-item d-flex align-items-center fw-bold fs-3 text-gray-800 ms-5">
        رادار الأسعار
      </div>
      <!--end::Page title-->

      <!--begin::Navbar-->
      <div class="app-navbar flex-shrink-0" id="kt_app_header_navbar">

        <!--begin::Theme mode toggle-->
        <div class="app-navbar-item ms-1 ms-md-3">
          <button class="btn btn-icon btn-custom btn-icon-muted btn-active-light btn-active-color-primary w-35px h-35px"
                  (click)="toggleTheme()"
                  title="تبديل المظهر">
            <i class="ki-duotone ki-night-day theme-light-show fs-2">
              <span class="path1"></span>
              <span class="path2"></span>
              <span class="path3"></span>
              <span class="path4"></span>
              <span class="path5"></span>
              <span class="path6"></span>
              <span class="path7"></span>
              <span class="path8"></span>
              <span class="path9"></span>
              <span class="path10"></span>
            </i>
            <i class="ki-duotone ki-moon theme-dark-show fs-2">
              <span class="path1"></span>
              <span class="path2"></span>
            </i>
          </button>
        </div>
        <!--end::Theme mode toggle-->

        <!--begin::Notifications-->
        <div class="app-navbar-item ms-1 ms-md-3">
          <div class="btn btn-icon btn-custom btn-icon-muted btn-active-light btn-active-color-primary w-35px h-35px position-relative"
               id="kt_menu_item_wow">
            <i class="ki-duotone ki-notification-bing fs-2">
              <span class="path1"></span>
              <span class="path2"></span>
              <span class="path3"></span>
            </i>
            <span class="position-absolute top-0 start-100 translate-middle badge badge-circle badge-danger fs-10">
              3
            </span>
          </div>
        </div>
        <!--end::Notifications-->

        <!--begin::User menu-->
        <div class="app-navbar-item ms-1 ms-md-3"
             id="kt_header_user_menu_toggle">
          <div class="cursor-pointer symbol symbol-35px"
               data-kt-menu-trigger="{default: 'click', lg: 'hover'}"
               data-kt-menu-attach="parent"
               data-kt-menu-placement="bottom-end">
            <img src="assets/media/avatars/300-1.jpg" class="rounded-3" alt="المستخدم" />
          </div>

          <!--begin::User account menu-->
          <div class="menu menu-sub menu-sub-dropdown menu-column menu-rounded menu-gray-800 menu-state-bg menu-state-color fw-semibold py-4 fs-6 w-275px"
               data-kt-menu="true">
            <div class="menu-item px-3">
              <div class="menu-content d-flex align-items-center px-3">
                <div class="symbol symbol-50px me-5">
                  <img alt="Logo" src="assets/media/avatars/300-1.jpg" />
                </div>
                <div class="d-flex flex-column">
                  <div class="fw-bolder d-flex align-items-center fs-5">
                    مستخدم النظام
                    <span class="badge badge-light-success fw-bolder fs-8 px-2 py-1 ms-2">نشط</span>
                  </div>
                  <span class="fw-bold text-muted text-hover-primary fs-7">admin&#64;priceradar.com</span>
                </div>
              </div>
            </div>
            <div class="separator my-2"></div>
            <div class="menu-item px-5">
              <a routerLink="/profile" class="menu-link px-5">الملف الشخصي</a>
            </div>
            <div class="menu-item px-5">
              <a routerLink="/settings" class="menu-link px-5">الإعدادات</a>
            </div>
            <div class="separator my-2"></div>
            <div class="menu-item px-5">
              <a routerLink="/auth/login" class="menu-link px-5">تسجيل الخروج</a>
            </div>
          </div>
          <!--end::User account menu-->
        </div>
        <!--end::User menu-->

      </div>
      <!--end::Navbar-->
    </div>
    <!--end::Header wrapper-->

  </div>
  <!--end::Header container-->

</div>
<!--end::Header-->
