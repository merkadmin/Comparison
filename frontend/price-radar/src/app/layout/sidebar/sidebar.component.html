<!--begin::Sidebar-->
<div id="kt_app_sidebar" class="app-sidebar flex-column"
     data-kt-drawer="true"
     data-kt-drawer-name="app-sidebar"
     data-kt-drawer-activate="{default: true, lg: false}"
     data-kt-drawer-overlay="true"
     data-kt-drawer-width="225px"
     data-kt-drawer-direction="end"
     data-kt-drawer-toggle="#kt_app_sidebar_mobile_toggle">

  <!--begin::Logo-->
  <div class="app-sidebar-logo px-6" id="kt_app_sidebar_logo">
    <a routerLink="/">
      <img alt="Logo" src="assets/media/logos/default-dark.svg" class="h-25px app-sidebar-logo-default" />
      <img alt="Logo" src="assets/media/logos/default-small.svg" class="h-20px app-sidebar-logo-minimize" />
    </a>
    <div id="kt_app_sidebar_toggle"
         class="app-sidebar-toggle btn btn-icon btn-shadow btn-sm btn-color-muted btn-active-color-primary h-30px w-30px position-absolute top-50 start-100 translate-middle rotate"
         data-kt-toggle="true"
         data-kt-toggle-state="active"
         data-kt-toggle-target="body"
         data-kt-toggle-name="app-sidebar-minimize">
      <i class="ki-duotone ki-black-left-line fs-3 rotate-180">
        <span class="path1"></span>
        <span class="path2"></span>
      </i>
    </div>
  </div>
  <!--end::Logo-->

  <!--begin::Sidebar menu-->
  <div class="app-sidebar-wrapper">
    <div id="kt_app_sidebar_menu_scroll"
         class="scroll-y my-5 mx-3"
         data-kt-scroll="true"
         data-kt-scroll-activate="true"
         data-kt-scroll-height="auto"
         data-kt-scroll-dependencies="#kt_app_sidebar_logo, #kt_app_sidebar_footer"
         data-kt-scroll-wrappers="#kt_app_sidebar_menu"
         data-kt-scroll-offset="5px"
         data-kt-scroll-save-state="true">

      <div class="menu menu-column menu-rounded menu-sub-indention fw-semibold fs-6"
           id="kt_app_sidebar_menu"
           data-kt-menu="true"
           data-kt-menu-expand="false">

        <!--begin::لوحة التحكم-->
        <div data-kt-menu-trigger="click" class="menu-item menu-accordion">
          <span class="menu-link">
            <span class="menu-icon">
              <i class="ki-duotone ki-element-11 fs-2">
                <span class="path1"></span>
                <span class="path2"></span>
                <span class="path3"></span>
                <span class="path4"></span>
              </i>
            </span>
            <span class="menu-title">لوحة التحكم</span>
            <span class="menu-arrow"></span>
          </span>
          <div class="menu-sub menu-sub-accordion">
            <div class="menu-item">
              <a class="menu-link" routerLink="/dashboard" routerLinkActive="active">
                <span class="menu-bullet"><span class="bullet bullet-dot"></span></span>
                <span class="menu-title">الرئيسية</span>
              </a>
            </div>
          </div>
        </div>
        <!--end::لوحة التحكم-->

        <!--begin::المنتجات-->
        <div data-kt-menu-trigger="click" class="menu-item menu-accordion">
          <span class="menu-link">
            <span class="menu-icon">
              <i class="ki-duotone ki-basket fs-2">
                <span class="path1"></span>
                <span class="path2"></span>
                <span class="path3"></span>
                <span class="path4"></span>
              </i>
            </span>
            <span class="menu-title">المنتجات</span>
            <span class="menu-arrow"></span>
          </span>
          <div class="menu-sub menu-sub-accordion">
            <div class="menu-item">
              <a class="menu-link" routerLink="/products" routerLinkActive="active">
                <span class="menu-bullet"><span class="bullet bullet-dot"></span></span>
                <span class="menu-title">قائمة المنتجات</span>
              </a>
            </div>
          </div>
        </div>
        <!--end::المنتجات-->

        <!--begin::الأسعار-->
        <div data-kt-menu-trigger="click" class="menu-item menu-accordion">
          <span class="menu-link">
            <span class="menu-icon">
              <i class="ki-duotone ki-chart-simple fs-2">
                <span class="path1"></span>
                <span class="path2"></span>
                <span class="path3"></span>
                <span class="path4"></span>
              </i>
            </span>
            <span class="menu-title">مقارنة الأسعار</span>
            <span class="menu-arrow"></span>
          </span>
          <div class="menu-sub menu-sub-accordion">
            <div class="menu-item">
              <a class="menu-link" routerLink="/prices" routerLinkActive="active">
                <span class="menu-bullet"><span class="bullet bullet-dot"></span></span>
                <span class="menu-title">مقارنة الأسعار</span>
              </a>
            </div>
            <div class="menu-item">
              <a class="menu-link" routerLink="/prices/history" routerLinkActive="active">
                <span class="menu-bullet"><span class="bullet bullet-dot"></span></span>
                <span class="menu-title">تاريخ الأسعار</span>
              </a>
            </div>
          </div>
        </div>
        <!--end::الأسعار-->

        <!--begin::المتاجر-->
        <div class="menu-item">
          <a class="menu-link" routerLink="/stores" routerLinkActive="active">
            <span class="menu-icon">
              <i class="ki-duotone ki-shop fs-2">
                <span class="path1"></span>
                <span class="path2"></span>
                <span class="path3"></span>
                <span class="path4"></span>
                <span class="path5"></span>
              </i>
            </span>
            <span class="menu-title">المتاجر</span>
          </a>
        </div>
        <!--end::المتاجر-->

      </div>
    </div>
  </div>
  <!--end::Sidebar menu-->

  <!--begin::Footer-->
  <div class="app-sidebar-footer flex-column-auto pt-2 pb-6 px-6" id="kt_app_sidebar_footer">
    <span class="text-muted fw-semibold fs-7">رادار الأسعار &copy; 2025</span>
  </div>
  <!--end::Footer-->

</div>
<!--end::Sidebar-->
