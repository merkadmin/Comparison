<div class="page">
  <div class="page-header">
    <h2>Items</h2>
  </div>

  <div class="filters">
    <select [(ngModel)]="selectedCategoryId" (change)="selectedBrandId=''; onFilterChange()">
      <option value="">All Categories</option>
      <option *ngFor="let c of categories" [value]="c.id">{{ c.name }}</option>
    </select>
    <select [(ngModel)]="selectedBrandId" (change)="selectedCategoryId=''; onFilterChange()">
      <option value="">All Brands</option>
      <option *ngFor="let b of brands" [value]="b.id">{{ b.name }}</option>
    </select>
  </div>

  <div *ngIf="loading" class="loading">Loading...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <table *ngIf="!loading && items.length > 0">
    <thead>
      <tr>
        <th>#</th>
        <th>Image</th>
        <th>Name</th>
        <th>Brand</th>
        <th>Categories</th>
        <th>Barcode</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of items; let i = index">
        <td>{{ i + 1 }}</td>
        <td>
          <img *ngIf="item.imageUrl" [src]="item.imageUrl" [alt]="item.name" class="thumb" />
          <span *ngIf="!item.imageUrl">—</span>
        </td>
        <td>{{ item.name }}</td>
        <td>{{ getBrandName(item.brandId) }}</td>
        <td>{{ getCategoryNames(item.categoryIds) }}</td>
        <td>{{ item.barcode || '—' }}</td>
        <td>
          <button class="btn-delete" (click)="delete(item.id!)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!loading && items.length === 0" class="empty">No items found.</div>
</div>
